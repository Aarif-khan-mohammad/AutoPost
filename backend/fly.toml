app = "autopost-backend"
primary_region = "sin"  # Singapore — closest to India

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  DOWNLOADS_DIR = "/tmp/autopost_downloads"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "autopost_downloads"
  destination = "/tmp/autopost_downloads"
