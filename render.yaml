services:
  - type: web
    name: autopost-backend
    runtime: python
    rootDir: backend
    buildCommand: apt-get install -y nodejs tor netcat-openbsd && pip install -r requirements.txt && python -c "import imageio_ffmpeg, shutil, os; shutil.copy(imageio_ffmpeg.get_ffmpeg_exe(), '/usr/local/bin/ffmpeg')"
    startCommand: bash start.sh
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_REFRESH_TOKEN
        sync: false
      - key: SCHEDULE_CHANNEL_URL
        sync: false
      - key: SCHEDULE_CHANNEL_URLS
        value: "https://www.youtube.com/@MrBeast,https://www.youtube.com/@IShowSpeed"
      - key: SCHEDULE_TIMES
        value: "07:00,12:00,18:00"
      - key: SCHEDULE_TIMEZONE
        value: "Asia/Kolkata"
      - key: FRONTEND_URL
        sync: false
      - key: YOUTUBE_COOKIES_B64
        sync: false
      - key: YTDLP_PROXY
        sync: false
